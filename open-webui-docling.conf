# Conf for open-webui-docling
# Look at full documentation https://docs.openwebui.com/features/chat-conversations/rag/document-extraction/docling/

DOCLING_HOST=127.0.0.1

DOCLING_PORT=5001

# For CUDA
DOCLING_IMAGE=ghcr.io/docling-project/docling-serve-cu128:latest

# For large image need to reduce dockerd max-concurrent-downloads to 1
DOCLING_IMAGE_LARGE=--large

# For CUDA
DOCLING_DEVICE="--gpus all"

# For installing new langs
#~ DOCLING_IMAGE_SRC=ghcr.io/docling-project/docling-serve-cu128:latest
# List of langs separated by comma (https://tesseract-ocr.github.io/tessdoc/Data-Files-in-different-versions.html)
#~ DOCLING_IMAGE_LANGS="eng,fra,deu"
#~ DOCLING_IMAGE=open-webui-docling-local

# Enable the web UI for testing
docling_DOCLING_SERVE_ENABLE_UI=true
# CRITICAL: Required for picture description with external LLM APIs
docling_DOCLING_SERVE_ENABLE_REMOTE_SERVICES=true
# Maximum wait time for sync requests (seconds) - increase for large documents
docling_DOCLING_SERVE_MAX_SYNC_WAIT=600
# Number of local engine workers
docling_DOCLING_SERVE_ENG_LOC_NUM_WORKERS=2
# CPU thread configuration
docling_OMP_NUM_THREADS=4
docling_MKL_NUM_THREADS=4
# IMPORTANT: Keep at 1 to avoid "Task Not Found" errors
docling_UVICORN_WORKERS=1
